<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L.B. — Web Design & Estratégia para Pequenas Empresas em Matosinhos e Porto</title>
    <meta name="description" content="Desenvolvo sites, landing pages e web apps focados em resultados para pequenas empresas em Matosinhos, Porto e todo o país. Fuja dos templates genéricos." />
    <meta name="keywords" content="web design matosinhos, criação de sites porto, web designer freelance, landing pages, web apps, desenvolvimento react, portugal" />
    
    <!-- Open Graph / Redes Sociais -->
    <meta property="og:title" content="L.B. — Web Design & Estratégia em Matosinhos e Porto" />
    <meta property="og:description" content="Desenvolvo sites, landing pages e web apps focados em resultados para pequenas empresas em Matosinhos, Porto e todo o país." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
